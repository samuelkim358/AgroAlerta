<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroAlerta — Iniciar sesión</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Encabezado -->
      <div class="auth-header">
        <img src="../assets/images/logo.png" alt="AgroAlerta Logo" class="auth-logo">
        <h1 class=".logo-text">Iniciar sesión</h1>
        <p class="auth-subtitle">Inicia sesión para acceder a tu panel agrícola</p>
      </div>

      <!-- Mensajes -->
      <div id="authMessage"></div>

      <!-- Formulario -->
      <form class="auth-form" id="loginForm">

        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="auth-btn">Iniciar sesión</button>

      </form>

      <!-- Enlace inferior -->
      <div class="auth-footer">
        ¿No tienes cuenta?
        <a href="registrarse.html">Registrarse</a>
      </div>

    </div>
  </div>

  <!-- Script -->
  <script src="../js/auth.js"></script>
</body>
</html>
