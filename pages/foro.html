<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroAlerta — Foro</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Estilos: globales → foro -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/foro.css">
</head>
<body>

  <!-- ═══════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <button class="sidebar-toggle" id="sidebarToggle">
      <span class="toggle-arrow">‹</span>
    </button>

    <div class="sidebar-logo">
      <img
        class="logo-img"
        src="assets/images/logo.png"
        alt="AgroAlerta logo"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div class="logo-icon-fallback" style="display:none;">🌿</div>
    </div>

    <nav class="nav">
      <a href="panel_alerta.html" data-label="Panel de Alertas">
        <span class="nav-icon">⊞</span>
        <span class="nav-label">Panel de Alertas</span>
      </a>
      <a href="tus_cultivos.html" data-label="Tus Cultivos">
        <span class="nav-icon">＋</span>
        <span class="nav-label">Tus Cultivos</span>
      </a>
      <a href="colaboraciones.html" data-label="Colaboraciones">
        <span class="nav-icon">◷</span>
        <span class="nav-label">Colaboraciones</span>
      </a>
      <div class="nav-divider"></div>
      <a href="support.html" data-label="Apoyo Técnico">
        <span class="nav-icon">🛠</span>
        <span class="nav-label">Apoyo Técnico</span>
      </a>
      <a href="foro.html" class="active" data-label="Foro">
        <span class="nav-icon">🗨</span>
        <span class="nav-label">Foro</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a href="index.html" id="btnLogout" data-label="Cerrar sesión">
        <span class="nav-icon">⇤</span> <span class="nav-label">Cerrar sesión</span>
      </a>
    </div>
  </aside>

  <!-- ═══════════════════════════════════
       MAIN
  ═══════════════════════════════════ -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <h1 class="page-title">Foro</h1>
        <p class="page-sub">Consulta reportes y solicitudes de la comunidad</p>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="todayDate">📅 --</div>
        <div class="avatar" id="userAvatar">--</div>
      </div>
    </div>

    <!-- Contenido -->
    <div class="content">

      <!-- Tarjeta principal -->
      <div class="card foro-card-wrapper">

        <!-- Encabezado de la card -->
        <div class="card-header">
          <div>
            <div class="card-title">Reportes de la comunidad</div>
            <div class="card-sub">Reportes y solicitudes enviadas al equipo</div>
          </div>

          <!-- Buscador -->
          <div class="foro-search-wrap">
            <span class="foro-search-icon">🔍</span>
            <input
              type="text"
              id="foroBuscar"
              class="foro-search"
              placeholder="Buscar ticket…"
            />
          </div>
        </div>

        <!-- Barra de filtros -->
        <div class="foro-filters">
          <button class="foro-filter-btn active" data-filtro="todos">
            Todos
          </button>
          <button class="foro-filter-btn" data-filtro="no_resuelto">
            <span class="filter-dot dot-warn"></span> Pendientes
          </button>
          <button class="foro-filter-btn" data-filtro="resuelto">
            <span class="filter-dot dot-ok"></span> Resueltos
          </button>

          <!-- Acceso rápido a soporte -->
          <a href="support.html" class="foro-new-btn">
            ＋ Nuevo reporte
          </a>
        </div>

        <!-- Lista de tickets — el JS inyecta aquí -->
        <div id="foroLista" class="foro-lista"></div>

      </div>
    </div>
  </div>

  <script src="js/foro_support.js"></script>
</body>
</html>
