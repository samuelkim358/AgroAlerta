<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroAlerta — Panel de Alertas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/panel_alerta.css">
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle">
        <span class="toggle-arrow">‹</span>
    </button>

    <div class="sidebar-logo">
      <img
        class="logo-img"
        src="../assets/images/logo.png"
        alt="AgroAlerta logo"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div class="logo-icon-fallback" style="display:none;">🌿</div>
    </div>

    <nav class="nav">
      <a href="panel_alerta.html" class="active" data-label="Panel de Alertas">
        <span class="nav-icon">⊞</span> <span class="nav-label">Panel de Alertas</span>
      </a>
      <a href="tus_cultivos.html" data-label="Tus Cultivos">
        <span class="nav-icon">＋</span> <span class="nav-label">Tus Cultivos</span>
      </a>
      <a href="colaboraciones.html" data-label="Colaboraciones">
        <span class="nav-icon">◷</span> <span class="nav-label">Colaboraciones</span>
      </a>
      <div class="nav-divider"></div>
      <a href="support.html" data-label="Apoyo Técnico">
        <span class="nav-icon">🛠</span> <span class="nav-label">Apoyo Técnico</span>
      </a>
      <a href="foro.html" data-label="Foro">
        <span class="nav-icon">🗨</span> <span class="nav-label">Foro</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a href="../index.html" id="btnLogout" data-label="Cerrar sesión">
        <span class="nav-icon">⇤</span> <span class="nav-label">Cerrar sesión</span>
      </a>
    </div>
  </aside>

  <div class="main">
    
    <div class="topbar">
      <div>
        <h1 class="page-title">Alertas Activas</h1>
        <p class="page-sub" id="regionSubtitle">Monitoreo de riesgos climáticos y biológicos</p>
      </div>

      <div class="topbar-right">
        <div class="topbar-date" id="todayDate">📅 --</div>
        <div class="avatar" id="userAvatar">--</div>
      </div>
    </div>

    <div class="content">
      <div class="alerts-strip" id="alertsStrip">
        </div>

      <div class="bottom-grid" style="grid-template-columns: 1fr;">
        <div class="card">
          <div class="card-header">
            <div>
              <h2 class="card-title">Plan de Acción Sugerido</h2>
              <p class="card-sub">Basado en tus cultivos activos y riesgos detectados</p>
            </div>
          </div>
          
          <div class="records-list" id="recommendationsList">
            </div>
        </div>
      </div>
    </div>

  </div><script src="../js/panel_alerta.js"></script>

</body>
</html>
