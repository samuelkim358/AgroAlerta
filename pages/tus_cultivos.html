<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroAlerta — Tus Cultivos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/cultivos.css">
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle">
        <span class="toggle-arrow">‹</span>
    </button>
    <div class="sidebar-logo">
      <img
        class="logo-img"
        src="../assets/images/logo.png"
        alt="AgroAlerta logo"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div class="logo-icon-fallback" style="display:none;">🌿</div>
    </div>
    <nav class="nav">
      <a href="panel_alerta.html" data-label="Panel de Alertas">
        <span class="nav-icon">⊞</span> <span class="nav-label">Panel de Alertas</span>
      </a>
      <a href="tus_cultivos.html" class="active" data-label="Tus Cultivos">
        <span class="nav-icon">＋</span> <span class="nav-label">Tus Cultivos</span>
      </a>
      <a href="colaboraciones.html" data-label="Colaboraciones">
        <span class="nav-icon">◷</span> <span class="nav-label">Colaboraciones</span>
      </a>
      <div class="nav-divider"></div>
      <a href="support.html" data-label="Apoyo Técnico">
        <span class="nav-icon">🛠</span> <span class="nav-label">Apoyo Técnico</span>
      </a>
      <a href="foro.html" data-label="Foro">
        <span class="nav-icon">🗨</span> <span class="nav-label">Foro</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="login.html" data-label="Cerrar sesión">
        <span class="nav-icon">⇤</span> <span class="nav-label">Cerrar sesión</span>
      </a>
    </div>
  </aside>

  <div class="main">
    
    <div class="topbar">
      <div>
        <h1 class="page-title">Tus Cultivos</h1>
        <p class="page-sub">
          <span id="nombreCampo">—</span> ·
          <span id="regionCampo">—</span>
        </p>
      </div>
      <div class="topbar-right">
        <a href="agregar_cultivo.html" class="btn-agregar">＋ Agregar cultivo</a>
        <div class="topbar-date" id="todayDate">📅 --</div>
        <div class="avatar">--</div>
      </div>
    </div>
    
    <div class="content">
      <div class="cultivos-stats">
        <div class="cultivo-stat-card">
          <div class="cultivo-stat-icon green">🌱</div>
          <div class="cultivo-stat-info">
            <div class="cultivo-stat-label">Cultivos activos</div>
            <div class="cultivo-stat-value" id="statCultivos">—</div>
          </div>
        </div>
        <div class="cultivo-stat-card">
          <div class="cultivo-stat-icon olive">📐</div>
          <div class="cultivo-stat-info">
            <div class="cultivo-stat-label">Total hectáreas</div>
            <div class="cultivo-stat-value" id="statHectareas">—</div>
          </div>
        </div>
        <div class="cultivo-stat-card">
          <div class="cultivo-stat-icon orange">🗓</div>
          <div class="cultivo-stat-info">
            <div class="cultivo-stat-label">Próxima cosecha</div>
            <div class="cultivo-stat-value" id="statProxima">—</div>
          </div>
        </div>
        <div class="cultivo-stat-card">
          <div class="cultivo-stat-icon blue">⏳</div>
          <div class="cultivo-stat-info">
            <div class="cultivo-stat-label">Días restantes</div>
            <div class="cultivo-stat-value" id="statDias">—</div>
          </div>
        </div>
      </div>
      
      <div id="cultivosGrid" class="cultivos-grid"></div>
      <div style="max-width: 450px; margin: 40px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <h3 style="text-align: center; color: #2d3436; margin-bottom: 20px;">Distribución de Hectáreas</h3>
        <div style="height: 300px;">
            <canvas id="chartHectareas"></canvas>
        </div>
    </div>
    </div>
  </div>

  <script src="../js/mis_cultivos.js"></script>
</body>
</html>
